services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq
    volumes:
      - ./:/app

  db:
    image: postgres:13
    env_file:
      - ./.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # ports:
    #   - 5432:5432

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    # ports:
    #   - 6379:6379

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file:
      - ./.env
    ports:
      #   - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.core.celery worker --loglevel=info
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
      - rabbitmq
    volumes:
      - ./:/app
      #-------- uncomment to run with nginx --------
